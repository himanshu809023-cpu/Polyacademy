<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin – Entrance Upload</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#f4f7fb;font-family:Segoe UI,sans-serif}
.navbar{background:#1E40AF}
.card{border-radius:14px}
</style>
</head>

<body>

<nav class="navbar navbar-dark">
  <div class="container">
    <span class="navbar-brand fw-bold">🔐 Admin Entrance Panel</span>
    <a href="entrance.html" class="btn btn-light btn-sm">View Page</a>
  </div>
</nav>

<div class="container mt-4">
  <div class="row">

    <!-- ADD / EDIT -->
    <div class="col-md-4">
      <div class="card p-3">
        <h5 id="formTitle">Add PDF</h5>

        <input id="title" class="form-control mb-2" placeholder="PDF Title">

        <select id="group" class="form-select mb-2">
          <option value="">Select Group</option>
           <option value="A">Group A</option>
           <option value="B">Group B</option>
           <option value="C">Group C</option>
           <option value="D">Group D</option>
           <option value="E1">Group E1</option>
           <option value="E2">Group E2</option>
           <option value="F">Group F</option>
           <option value="G">Group G</option>
           <option value="H">Group H</option>
           <option value="I">Group I</option>
           <option value="K">Group K1-K2</option>
           <option value="L">Group L</option>
           </select>

        <select id="type" class="form-select mb-2">
          <option value="">Select Type</option>
          <option value="mock">Mock Test</option>
          <option value="question">Important Question</option>
          <option value="important">Important Notes</option>
        </select>

        <input id="pdf" class="form-control mb-3" placeholder="PDF Link">

        <button class="btn btn-primary w-100" onclick="save()">Save</button>
      </div>
    </div>

    <!-- LIST -->
    <div class="col-md-8">
      <div class="card p-3">
        <h5>All PDFs</h5>
        <ul id="list" class="list-group"></ul>
      </div>
    </div>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc }
from "https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA8H01tcT7TculXjhhHOhpGuQF-YhSqAnY",
  authDomain: "hpresult-612a4.firebaseapp.com",
  projectId: "hpresult-612a4",
  messagingSenderId: "938318154272",
  appId: "1:938318154272:web:f55d536591e673b03d8a45"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let editId = null;

window.save = async () => {
  const title = titleInput.value.trim();
  const group = groupInput.value;
  const type = typeInput.value;
  const pdf = pdfInput.value.trim();

  if(!title || !group || !type || !pdf){
    alert("Fill all fields");
    return;
  }

  if(editId){
    await updateDoc(doc(db,"entrance_pdfs",editId),{ title,group,type,pdf });
    editId = null;
    formTitle.innerText = "Add PDF";
  } else {
    await addDoc(collection(db,"entrance_pdfs"),{ title,group,type,pdf });
  }

  clearForm();
  load();
};

async function load(){
  list.innerHTML = "";
  const snap = await getDocs(collection(db,"entrance_pdfs"));

  snap.forEach(d=>{
    const n = d.data();
    list.innerHTML += `
      <li class="list-group-item d-flex justify-content-between align-items-center">
        <div>
          <b>${n.title}</b><br>
          <small>${n.group} | ${n.type}</small>
        </div>
        <div>
          <button class="btn btn-sm btn-warning" onclick="edit('${d.id}','${n.title}','${n.group}','${n.type}','${n.pdf}')">Edit</button>
          <button class="btn btn-sm btn-danger" onclick="remove('${d.id}')">Delete</button>
        </div>
      </li>
    `;
  });
}

window.edit = (id,title,group,type,pdf) => {
  editId = id;
  titleInput.value = title;
  groupInput.value = group;
  typeInput.value = type;
  pdfInput.value = pdf;
  formTitle.innerText = "Edit PDF";
};

window.remove = async (id) => {
  if(confirm("Delete this PDF?")){
    await deleteDoc(doc(db,"entrance_pdfs",id));
    load();
  }
};

function clearForm(){
  titleInput.value="";
  groupInput.value="";
  typeInput.value="";
  pdfInput.value="";
}

const titleInput = document.getElementById("title");
const groupInput = document.getElementById("group");
const typeInput = document.getElementById("type");
const pdfInput = document.getElementById("pdf");
const list = document.getElementById("list");
const formTitle = document.getElementById("formTitle");

load();
</script>

</body>
</html>
