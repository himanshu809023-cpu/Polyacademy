<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Study Progress</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Segoe UI,Arial;
  background:#f1f5f9;
}
header{
  background:#1E40AF;
  color:#fff;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:700;
}
.container{
  max-width:1000px;
  margin:auto;
  padding:15px;
}
.card{
  background:#fff;
  padding:15px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
  margin-bottom:15px;
}
h3{ color:#1E40AF; margin-top:0; }

input,select{
  padding:8px;
  border-radius:6px;
  border:1px solid #cbd5e1;
}
button{
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:600;
  padding:8px 10px;
}
.btn-add{ background:#1E40AF;color:#fff; }
.btn-now{ background:#0ea5e9;color:#fff; }
.btn-complete{ background:#16a34a;color:#fff;font-size:12px; }
.btn-delete{ background:#dc2626;color:#fff;font-size:12px; }

.task{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  border-bottom:1px solid #e5e7eb;
}
.task.high{ border-left:5px solid #dc2626; }
.task.medium{ border-left:5px solid #f97316; }
.task.low{ border-left:5px solid #16a34a; }

.task.completed{
  opacity:0.7;
  text-decoration:line-through;
}
.task-left{
  display:flex;
  flex-direction:column;
}
.task-meta{
  font-size:12px;
  color:#6b7280;
}

.progress-bar{
  height:18px;
  background:#e5e7eb;
  border-radius:10px;
  overflow:hidden;
}
.progress-fill{
  height:100%;
  background:#16a34a;
  width:0%;
}
.stats{
  display:flex;
  justify-content:space-between;
  margin-top:6px;
  font-size:14px;
}
.badge{
  background:#e0e7ff;
  padding:5px 10px;
  border-radius:20px;
  font-weight:600;
  color:#1E40AF;
}
.top-header{
background:#1e3a8a;
padding:15px 20px;
display:flex;
align-items:center;
justify-content:center;
}

.logo-container{
display:flex;
align-items:center;
gap:15px;
}

.logo-container img{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
border:3px solid white;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.logo-container h2{
color:white;
margin:0;
font-size:22px;
}
</style>
</head>

<body>
<header class="top-header">

  <div class="logo-container">
    <img src="logo.png" alt="Poly Academy Logo">
    <h2>Poly Academy</h2>
  </div>

</header>
<header>📊 Advanced Study Progress Tracker</header>

<div class="container">
<head><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6313664443076686"
     crossorigin="anonymous"></script></head>
<!-- ADD TASK -->
<div class="card">
<h3>Add Task</h3>
<input id="taskText" placeholder="Task name">
<input id="taskDate" type="date" placeholder="Date" >
<input id="taskTime" type="time" placeholder="Time" >
<input id="taskMinutes" type="number" placeholder="Minutes" style="width:90px">
<select id="priority">
  <option value="low">Low</option>
  <option value="medium">Medium</option>
  <option value="high">High</option>
</select>
<button class="btn-now" onclick="setNow()">Now</button>
<button class="btn-add" onclick="addTask()">Add</button>
</div>

<!-- FILTER -->
<div class="card">
<h3>Filters</h3>
<select onchange="filterTasks(this.value)">
  <option value="all">All</option>
  <option value="pending">Pending</option>
  <option value="completed">Completed</option>
  <option value="high">High Priority</option>
</select>
</div>

<!-- TASK LIST -->
<div class="card">
<h3>Tasks</h3>
<div id="taskList"></div>
</div>

<!-- PROGRESS -->
<div class="card">
<h3>Progress</h3>
<div class="progress-bar">
<div class="progress-fill" id="progressFill"></div>
</div>
<div class="stats">
<span id="completed"></span>
<span id="pending"></span>
<span class="badge" id="streak">🔥 Streak: 0</span>
</div>
<p>Total Study Time: <b id="totalTime">0</b> min</p>
</div>

</div>

<script>
let tasks = JSON.parse(localStorage.getItem("advTasks")) || [];
let filter="all";

function setNow(){
  const now=new Date();
  taskDate.value=now.toISOString().split("T")[0];
  taskTime.value=now.toTimeString().slice(0,5);
}

function addTask(){
  if(!taskText.value) return alert("Add task");
  tasks.push({
    text:taskText.value,
    date:taskDate.value,
    time:taskTime.value,
    min:taskMinutes.value||0,
    priority:priority.value,
    done:false,
    day:new Date().toDateString()
  });
  taskText.value="";
  save();
}

function toggle(i){
  tasks[i].done=!tasks[i].done;
  save();
}

function del(i){
  tasks.splice(i,1);
  save();
}

function filterTasks(v){
  filter=v;
  render();
}

function save(){
  localStorage.setItem("advTasks",JSON.stringify(tasks));
  render();
}

function render(){
  let list=document.getElementById("taskList");
  list.innerHTML="";
  let comp=0,time=0;

  tasks.forEach((t,i)=>{
    if(filter==="pending" && t.done) return;
    if(filter==="completed" && !t.done) return;
    if(filter==="high" && t.priority!=="high") return;

    if(t.done){ comp++; time+=Number(t.min); }

    list.innerHTML+=`
    <div class="task ${t.priority} ${t.done?"completed":""}">
      <div class="task-left">
        <b>${t.text}</b>
        <span class="task-meta">📅 ${t.date} ⏰ ${t.time} | ⏳ ${t.min} min</span>
      </div>
      <div>
        <button class="btn-complete" onclick="toggle(${i})">${t.done?"Undo":"Done"}</button>
        <button class="btn-delete" onclick="del(${i})">X</button>
      </div>
    </div>`;
  });

  document.getElementById("completed").innerText="Completed: "+comp;
  document.getElementById("pending").innerText="Pending: "+(tasks.length-comp);
  document.getElementById("totalTime").innerText=time;

  document.getElementById("progressFill").style.width=
    tasks.length?(comp/tasks.length*100)+"%":"0%";
}

render();
</script>

</body>
</html>
