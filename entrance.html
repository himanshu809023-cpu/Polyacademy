<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Polytechnic Entrance</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#f4f7fb;font-family:Segoe UI,sans-serif}
.navbar{background:#1E40AF}
.section-title{color:#1E40AF;font-weight:700}
.card{border-radius:14px}
footer{background:#1E40AF;color:#fff}
.top-header{
background:#1e3a8a;
padding:15px 20px;
display:flex;
align-items:center;
justify-content:center;
}

.logo-container{
display:flex;
align-items:center;
gap:15px;
}

.logo-container img{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
border:3px solid white;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.logo-container h2{
color:white;
margin:0;
font-size:22px;
}
</style>
</head>

<body>
<header class="top-header">

  <div class="logo-container">
    <img src="logo.png" alt="Poly Academy Logo">
    <h2>Poly Academy</h2>
  </div>

</header>
<!-- NAVBAR -->
<nav class="navbar navbar-dark">
  <div class="container">
    <span class="navbar-brand fw-bold">📘 Polytechnic Entrance prepration</span>
    <a href="index.html" class="btn btn-light btn-sm">Home</a>
      <a href="contact.html" class="btn btn-light btn-sm">Contact Us</a>
        <a href="notes.html" class="btn btn-light btn-sm">Semester notes</a>
  </div>
</nav>
<head><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6313664443076686"
     crossorigin="anonymous"></script></head>
<!-- GROUP SELECT -->
<div class="container mt-4">
  <div class="card p-4">
    <h5 class="section-title">Select Group</h5>
    <select id="group" class="form-select mt-2">
      <option value="">Select Group</option>
      <option value="A">Group A</option>
      <option value="B">Group B</option>
      <option value="C">Group C</option>
      <option value="D">Group D</option>
      <option value="E1">Group E1</option>
      <option value="E2">Group E2</option>
      <option value="F">Group F</option>
      <option value="G">Group G</option>
      <option value="H">Group H</option>
      <option value="I">Group I</option>
      <option value="K">Group K1-K2</option>
      <option value="L">Group L</option>
    </select>
  </div>
</div>

<!-- MOCK TEST PDF -->
<div class="container mt-4">
  <h5 class="section-title">📝 Mock Test Links</h5>
  <ul id="mockList" class="list-group mt-2"></ul>
</div>

<!-- QUESTION PDF -->
<div class="container mt-4">
  <h5 class="section-title">❓ Question PDFs</h5>
  <ul id="questionList" class="list-group mt-2"></ul>
</div>

<!-- IMPORTANT PDF -->
<div class="container mt-4">
  <h5 class="section-title">⭐ Important PDFs</h5>
  <ul id="importantList" class="list-group mt-2"></ul>
</div>

<footer class="mt-5 p-3 text-center">
  <small>© Polytechnic Notes | Entrance Preparation</small>
</footer>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs } 
from "https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA8H01tcT7TculXjhhHOhpGuQF-YhSqAnY",
  authDomain: "hpresult-612a4.firebaseapp.com",
  projectId: "hpresult-612a4",
  messagingSenderId: "938318154272",
  appId: "1:938318154272:web:f55d536591e673b03d8a45"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("group").addEventListener("change", loadData);

async function loadData(){
  const group = document.getElementById("group").value;
  if(!group) return;

  loadSection("mock", "mockList", group);
  loadSection("question", "questionList", group);
  loadSection("important", "importantList", group);
}

async function loadSection(type, listId, group){
  const list = document.getElementById(listId);
  list.innerHTML = "<li class='list-group-item'>Loading...</li>";

  const q = query(
    collection(db,"entrance_pdfs"),
    where("type","==",type),
    where("group","==",group)
  );

  const snap = await getDocs(q);
  list.innerHTML = "";

  if(snap.empty){
    list.innerHTML = "<li class='list-group-item text-muted'>No PDF found</li>";
    return;
  }

  snap.forEach(doc=>{
    const d = doc.data();
    list.innerHTML += `
      <li class="list-group-item d-flex justify-content-between">
        <span>${d.title}</span>
        <a href="${d.pdf}" target="_blank" class="btn btn-sm btn-primary">Open</a>
      </li>
    `;
  });
}
</script>

</body>
</html>
