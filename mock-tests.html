<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mock Tests - PolyAcademy</title>
<style>
body{margin:0;font-family:Arial;background:#f1f5f9;}
header{background:#1e40af;color:white;padding:15px;text-align:center;}
.container{padding:15px;}
.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
cursor:pointer;
}
.card:hover{transform:scale(1.02);}
.badge{
display:inline-block;
background:#1e40af;
color:white;
padding:6px 12px;
border-radius:6px;
margin-top:10px;
}
.top-header{
background:#1e3a8a;
padding:15px 20px;
display:flex;
align-items:center;
justify-content:center;
}

.logo-container{
display:flex;
align-items:center;
gap:15px;
}

.logo-container img{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
border:3px solid white;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.logo-container h2{
color:white;
margin:0;
font-size:22px;
}
</style>
</head>

<body>
<header class="top-header">

  <div class="logo-container">
    <img src="logo.png" alt="Poly Academy Logo">
    <h2>Poly Academy</h2>
  </div>

</header>
<header><h1>JEECUP Mock Tests</h1></header>
<div class="container" id="testList"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA8H01tcT7TculXjhhHOhpGuQF-YhSqAnY",
  authDomain: "hpresult-612a4.firebaseapp.com",
  projectId: "hpresult-612a4",
  messagingSenderId: "938318154272",
  appId: "1:938318154272:web:f55d536591e673b03d8a45"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

async function loadTests(){
  const snap=await getDocs(collection(db,"tests"));
  const container=document.getElementById("testList");

  snap.forEach(doc=>{
    const t=doc.data();
    container.innerHTML+=`
      <div class="card" onclick="openTest('${doc.id}')">
        <b>${t.name}</b>
        <div>Subject: ${t.subject}</div>
        <div>Duration: ${t.duration} Minutes</div>
        <div>Total Questions: ${t.totalQuestions}</div>
        <div class="badge">Start Test</div>
      </div>
    `;
  });
}

window.openTest=function(id){
  localStorage.setItem("selectedTest",id);
  window.location.href="instructions.html";
}

loadTests();
</script>

</body>
</html>
