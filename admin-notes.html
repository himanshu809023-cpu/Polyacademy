<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel – Polytechnic Notes</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    .admin-btn:hover{
    background: #2563EB;
    transform: scale(1.05);

  </style>
</head>

<div class="container" id="passwordCard" style="max-width:400px;">

    <div class="card-body">
      <h4 class="mb-3 text-center">Admin Password</h4>
      <input type="password" id="password" class="form-control mb-2" placeholder="Enter Password">
      <button class="btn btn-primary w-100" id="loginBtn">Enter</button>
      <p id="msg" class="mt-2 text-danger text-center"></p>
    </div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminContent" class="hidden">

</nav>

<div class="container mt-4">
  <div class="row">

    <!-- ADD NOTE FORM -->
    <div class="col-md-4">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5 class="mb-3">Add Note</h5>

          <select id="branch" class="form-select mb-2">
            <option value="">Select Branch</option>
            <option>All</option>
            <option>Mechanical</option>

            <option>Electrical</option>
            <option>I&C</option>
            <option>IT</option>
            <option>PMT</option>
            <option>TC</option>
            <option>TT</option>
            <option>Electronix</option>
            <option>Paint technology</option>
            <option>Chemical</option>
          </select>

          <select id="semester" class="form-select mb-2">
            <option value="">Select Semester</option>
            <option>1</option><option>2</option><option>3</option>
            <option>4</option><option>5</option><option>6</option>
          </select>

          <input id="subject" class="form-control mb-2" placeholder="Subject Name">
          <input id="pdfLink" class="form-control mb-2" placeholder="PDF Direct Link">

          <button class="btn btn-primary w-100" id="saveBtn">Save Note</button>
        </div>
      </div>
    </div>
 

    <!-- ALL NOTES -->
    <div class="col-md-8">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5 class="mb-3">All Notes</h5>
          <ul id="list" class="list-group"></ul>
        </div>
      </div>
    </div>

  </div>
</div>

</div>

      const subject = document.getElementById("subject").value;
      const pdfLink = document.getElementById("pdfLink").value;

      if(!branch || !semester || !subject || !pdfLink){
        alert("Please fill all fields");
        return;
      }

      await addDoc(collection(db,"notes"), {branch, semester, subject, pdfLink});

      document.getElementById("subject").value = "";
      document.getElementById("pdfLink").value = "";

      loadNotes();
  }

  async function loadNotes(){
      const ul = document.getElementById("list");
      ul.innerHTML = "";
      const snap = await getDocs(collection(db,"notes"));

      snap.forEach(d => {
        const note = d.data();
        ul.innerHTML += `
          <li class="list-group-item d-flex justify-content-between align-items-center">
            <div>
              <b>${note.subject}</b><br>
              <small class="text-muted">${note.branch} | Sem ${note.semester}</small>
            </div>
            <button class="btn btn-sm btn-danger" onclick="removeNote('${d.id}')">Delete</button>
          </li>
        `;
      });
  }

  window.removeNote = async (id) => {
      if(confirm("Delete this note?")){
        await deleteDoc(doc(db,"notes",id));
        loadNotes();
      }
  }
