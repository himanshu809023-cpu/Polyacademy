<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Study Planner</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#f4f6f8}
.card{border-radius:14px}
.done{text-decoration:line-through;color:gray}
td[contenteditable]{background:#fff;min-width:90px}
#timer{font-size:48px;font-weight:bold}
.top-header{
background:#1e3a8a;
padding:15px 20px;
display:flex;
align-items:center;
justify-content:center;
}

.logo-container{
display:flex;
align-items:center;
gap:15px;
}

.logo-container img{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
border:3px solid white;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.logo-container h2{
color:white;
margin:0;
font-size:22px;
}
</style>
</head>

<body>
<header class="top-header">

  <div class="logo-container">
    <img src="logo.png" alt="Poly Academy Logo">
    <h2>Poly Academy</h2>
  </div>

</header>
<nav class="navbar navbar-dark bg-primary">
  <div class="container">
    <span class="navbar-brand fw-bold">📘 Study Planner & Timetable</span>
  </div>
</nav>

<div class="container mt-4">

<head><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6313664443076686"
     crossorigin="anonymous"></script></head>

<!-- ===== STUDY PLANNER ===== -->
<div class="card shadow-sm mb-4">
  <div class="card-body">
    <h5>➕ Add Study Task</h5>

    <div class="row g-2">
      <div class="col-md-2">
        <select id="day" class="form-select">
          <option value="">Day</option>
          <option>Monday</option><option>Tuesday</option><option>Wednesday</option>
          <option>Thursday</option><option>Friday</option><option>Saturday</option><option>Sunday</option>
        </select>
      </div>

      <div class="col-md-2">
        <input type="time" id="time" class="form-control">
      </div>

      <div class="col-md-3">
        <input id="subject" class="form-control" placeholder="Subject">
      </div>

      <div class="col-md-3">
        <input id="goal" class="form-control" placeholder="Topic / Goal">
      </div>

      <div class="col-md-2 d-grid">
        <button class="btn btn-primary" onclick="addSlot()">Add</button>
      </div>
    </div>
  </div>
</div>

<div id="planner" class="row g-3"></div>

<!-- ===== TIMETABLE ===== -->
<div class="card shadow-sm mt-4">
  <div class="card-body">
    <h5>🗓️ Weekly Timetable</h5>

    <div class="row g-2 mb-3">
      <div class="col-md-3">
        <input type="time" id="fromTime" class="form-control">
      </div>
      <div class="col-md-3">
        <input type="time" id="toTime" class="form-control">
      </div>
      <div class="col-md-3 d-grid">
        <button class="btn btn-success" onclick="addRow()">➕ Add Time Slot</button>
      </div>
    </div>

    <div class="table-responsive">
      <table class="table table-bordered text-center">
        <thead class="table-primary">
          <tr>
            <th>Time</th>
            <th>Mon</th><th>Tue</th><th>Wed</th>
            <th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th>
            <th>❌</th>
          </tr>
        </thead>
        <tbody id="timeTable"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ===== FOCUS TIMER ===== -->
<div class="card shadow-sm mt-4 text-center">
  <div class="card-body">
    <h5>⏱️ Focus Study Timer</h5>
    <div id="timer">25:00</div>

    <button class="btn btn-success me-2" onclick="startTimer()">Start</button>
    <button class="btn btn-warning me-2" onclick="pauseTimer()">Pause</button>
    <button class="btn btn-danger" onclick="resetTimer()">Reset</button>
  </div>
</div>

<div class="text-center mt-4 mb-5">
  <button class="btn btn-outline-danger btn-sm" onclick="resetAll()">Reset All Data</button>
</div>

</div>

<script>
/* ===== STUDY PLANNER ===== */
const days=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const planner=document.getElementById("planner");

function initPlanner(){
  planner.innerHTML="";
  days.forEach(d=>{
    planner.innerHTML+=`
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-body">
          <h6 class="text-primary">${d}</h6>
          <ul class="list-group" id="${d}"></ul>
        </div>
      </div>
    </div>`;
  });
  loadPlanner();
}

function addSlot(){
  if(!day.value||!time.value||!subject.value) return alert("Fill required fields");

  const data=JSON.parse(localStorage.getItem("planner"))||{};
  if(!data[day.value]) data[day.value]=[];

  data[day.value].push({
    time:time.value,
    subject:subject.value,
    goal:goal.value,
    done:false
  });

  localStorage.setItem("planner",JSON.stringify(data));
  subject.value=""; goal.value="";
  loadPlanner();
}

function loadPlanner(){
  days.forEach(d=>document.getElementById(d).innerHTML="");
  const data=JSON.parse(localStorage.getItem("planner"))||{};
  let total=0,done=0;

  for(let d in data){
    data[d].forEach((t,i)=>{
      total++; if(t.done) done++;
      document.getElementById(d).innerHTML+=`
      <li class="list-group-item d-flex justify-content-between">
        <span onclick="toggle('${d}',${i})" class="${t.done?'done':''}" style="cursor:pointer">
          ⏰ ${t.time} | <b>${t.subject}</b><br><small>${t.goal||''}</small>
        </span>
        <button class="btn btn-sm btn-danger" onclick="del('${d}',${i})">✖</button>
      </li>`;
    });
  }

  totalTask.innerText=total;
  doneTask.innerText=done;
  pendingTask.innerText=total-done;
}

function toggle(d,i){
  const data=JSON.parse(localStorage.getItem("planner"));
  data[d][i].done=!data[d][i].done;
  localStorage.setItem("planner",JSON.stringify(data));
  loadPlanner();
}

function del(d,i){
  const data=JSON.parse(localStorage.getItem("planner"));
  data[d].splice(i,1);
  localStorage.setItem("planner",JSON.stringify(data));
  loadPlanner();
}

/* ===== TIMETABLE ===== */
const table=document.getElementById("timeTable");
function addRow(){
  if(!fromTime.value||!toTime.value) return alert("Select time");
  table.innerHTML+=`
  <tr>
    <th>${fromTime.value} - ${toTime.value}</th>
    <td contenteditable></td><td contenteditable></td><td contenteditable></td>
    <td contenteditable></td><td contenteditable></td><td contenteditable></td><td contenteditable></td>
    <td><button class="btn btn-sm btn-danger" onclick="this.closest('tr').remove();saveTable()">✖</button></td>
  </tr>`;
  saveTable();
}
function saveTable(){localStorage.setItem("timetable",table.innerHTML);}
function loadTable(){const d=localStorage.getItem("timetable"); if(d) table.innerHTML=d;}
table.addEventListener("input",saveTable);

/* ===== TIMER ===== */
let timeLeft=1500,interval=null;
function startTimer(){
  if(interval) return;
  interval=setInterval(()=>{
    if(timeLeft<=0){
      pauseTimer();
      alert("Time up! Take a break 😊");
      return;
    }
    timeLeft--; updateTimer();
  },1000);
}
function pauseTimer(){clearInterval(interval);interval=null;}
function resetTimer(){pauseTimer();timeLeft=1500;updateTimer();}
function updateTimer(){
  const m=String(Math.floor(timeLeft/60)).padStart(2,"0");
  const s=String(timeLeft%60).padStart(2,"0");
  timer.innerText=`${m}:${s}`;
}

/* ===== RESET ===== */
function resetAll(){
  if(confirm("Delete all data?")){
    localStorage.clear();
    location.reload();
  }
}

/* INIT */
initPlanner(); loadTable(); updateTimer();
</script>

</body>
</html>
