<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact – Polytechnic Notes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
    }

    .contact-card {
      background: white;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
      padding: 40px 30px;
      max-width: 450px;
      width: 100%;
      text-align: center;
    }

    .contact-card h2 {
      color: #333;
      margin-bottom: 15px;
    }

    .contact-card p {
      color: #555;
      margin-bottom: 30px;
      line-height: 1.5;
    }

    .btn-contact {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px;
      font-size: 16px;
      border-radius: 50px;
      transition: 0.3s;
    }

    .btn-email {
      background-color: #007bff;
      color: white;
    }
    .btn-email:hover {
      background-color: #0056b3;
      color: white;
    }

    .btn-whatsapp {
      background-color: #25D366;
      color: white;
    }
    .btn-whatsapp:hover {
      background-color: #1DA851;
      color: white;
    }
    .top-header{
    background:#1e3a8a;
    padding:15px 20px;
    display:flex;
    align-items:center;
    justify-content:center;
    }
    
    .logo-container{
    display:flex;
    align-items:center;
    gap:15px;
    }
    
    .logo-container img{
    width:60px;
    height:60px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid white;
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
    }
    
    .logo-container h2{
    color:white;
    margin:0;
    font-size:22px;
    }
  </style>
</head>
<body>

</header>
<div class="contact-card">
